<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <tr>
        <th>school</th>
        <th>location</th>
        </tr>
        <tr>
        <td>ESMAD</td>
        <td>Vila do Conde</td>
        </tr>
    </table>

    <table id="mytable"></table>

    <script>
        //a.
        const table = document.createElement('table');
        const tr1 = document.createElement('tr');
        const tr2 = document.createElement('tr');
        const th1 = document.createElement('th');
        const th2 = document.createElement('th');
        const td1 = document.createElement('td');
        const td2 = document.createElement('td');
        const th1Text = document.createTextNode('school');
        const th2Text = document.createTextNode('location');
        const td1Text = document.createTextNode('ESMAD');
        const td2Text = document.createTextNode('Vila do Conde');

        table.appendChild(tr1);
        table.appendChild(tr2);
        tr1.appendChild(th1);
        tr1.appendChild(th2);
        tr2.appendChild(td1);
        tr2.appendChild(td2);
        th1.appendChild(th1Text);
        th2.appendChild(th2Text);
        td1.appendChild(td1Text);
        td2.appendChild(td2Text);
        document.body.appendChild(table);

        //b. Recreate the table using template strings and the innerHTML
        // += adiciona ao HMTL o conteúdo
        document.body.innerHTML += `
            <table>
            <tr>
            <th>school</th>
            <th>location</th>
            </tr>
            <tr>
            <td>ESMAD</td>
            <td>Vila do Conde</td>
            </tr>
            </table>
        `;

        const table1 = document.getElementById("mytable");
        
        const tr3 = document.createElement('tr');

        const td3 = document.createElement('td');
        const td4 = document.createElement('td');

        const td3Text = document.createTextNode('ISEP');
        const td4Text = document.createTextNode('Porto');

        tr3.appendChild(td3);
        tr3.appendChild(td4);

        td3.appendChild(td3Text);
        td4.appendChild(td4Text);
        
        table.appendChild(tr3);


    </script>
</body>
</html>
