<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function calc(num1, num2, operator) {
            let result = '';
            switch (operator) {
                case "+":
                    result = num1 + num2;
                    break;
                
                case "-":
                    result = num1 - num2;
                    break;
                
                case "*":
                    result = num1 * num2;
                    break;

                case "/":
                    if (num2 === 0) {
                        result = 'It is not possible to divide by 0';
                    } else {
                    result = num1 / num2;
                    break;
                    }
                default:
                    result = "Invalid operator";
                    break;
            }
            alert(result);
        }
        
        const num1 = +prompt("Enter a number");
        const num2 = +prompt("Enter a number");
        const operator = prompt("Enter an operator (+, -, *, /)");
        calc(num1, num2, operator);


    </script>
</body>
</html>
