<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let isPerfect = function(number) {
            let sum = 0;
            for (let i = 1; i < number; i++) {
                if (number % i === 0) {
                    sum += i;
                }
            }
            if (sum === number) {
                return true;
            } else {
                return false;
            }
        }

        let number = 0;
        while (!isPerfect(number)) {
            number = parseInt(prompt("Enter a number: "));
        }
    </script>
</body>
</html>
