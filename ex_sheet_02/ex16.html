<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function isLeapYear(year) {
            for (i = 0; i < year; i++) {
                if (year % 4 === 0 && year % 100 !== 0 || year % 400 === 0) {
                    return true;
                } else {
                    return false;
                }
            }
        }

        console.log(isLeapYear(2005));
    </script>
</body>
</html>
