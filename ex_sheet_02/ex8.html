<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function multiplesThree(a, b) {
            let sum = 0;
            for (let i = a; i <= b; i++) {
                if (i % 3 === 0) {
                    sum += i;
                }
            }
            console.log(`The sum of multiples of 3 between ${a} and ${b} is ${sum}`);
        }

        multiplesThree(3, 50);
    </script>
</body>
</html>
