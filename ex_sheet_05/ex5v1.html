<body>
    <script>
        const salaries = {
            John: 100,
            Ann: 160,
            Pete: 130
        };

        function sumSalaries(salaries) {
            let soma = 0;
            for (const key in salaries) {
                soma += parseInt(Object.values(salaries));
            }
            return soma;
        };

        console.log(sumSalaries(salaries));
    </script>
