<body>
    <script>
        const menu = {
            width: 200,
            height: 300,
            title: "My menu"
        };

        const multiplyNumeric = (obj) => {
            for (const key in obj) {
                if (typeof obj[key] === 'number') {
                    result = obj[key]*2;
                }
            }
            return result;
        };

        multiplyNumeric(menu);
        console.log(multiplyNumeric(menu));
    </script>
