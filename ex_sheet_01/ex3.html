<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        var number1 = parseFloat(prompt("Enter the first decimal number: "));
        var number2 = parseFloat(prompt("Enter the second decimal number: "));

        var sum = number1 + number2;

        console.log("The sum of " + number1 + " and " + number2 + " is: " + sum);
    </script>
</body>
