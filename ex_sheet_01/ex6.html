<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        const str = prompt("Enter a string");
        const reversedStr = str.split("").reverse().join("");
        console.log(str === reversedStr ? "Palindrome" : "Not Palindrome");
        
    </script>
</body>
