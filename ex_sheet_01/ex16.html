<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = +prompt("Enter a number: ");
        let sum = 0;
        for (let i = 1; i < num; i++) {
            if (number % i === 0) {
                sum += i;
            }
        }

        console.log(sum === num ? "YES" : "NO");
        
    </script>
</body>
</html>
