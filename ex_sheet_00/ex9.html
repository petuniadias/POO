<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const grade = prompt("Nota:");

        if(grade <= 20 && grade >= 10) {
            alert("POSITIVE")
        }
        else if (grade >= 7 && grade < 10) {
            alert("ORAL")
        }
        else if (grade >= 0 && grade < 7) {
           alert("NEGATIVE") 
        }
        else {
            alert("INVALID GRADE")
        }
    </script>
</body>
</html>
